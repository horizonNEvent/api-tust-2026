apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: tust-worker-browser
  namespace: tust-apps
spec:
  scaleTargetRef:
    name: deployment-worker-browser
  # Mantem de 0 a 10 pods (Browser consome mais recursos que a Default)
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 10
  cooldownPeriod: 300
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: "{SQS_QUEUE_URL_BROWSER}" # A ser injetado pelo Terraform
        queueLength: "3" # Sobe um Pod a cada 3 tarefas de Navegacao
        awsRegion: "us-east-1"
        identityOwner: keda
