apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: tust-worker-ocr-heavy
  namespace: tust-apps
spec:
  scaleTargetRef:
    name: deployment-worker-ocr
  # Economia de Custo Brutal (Mantem Zero maquinas GPU/Memoria ligadas ate chegar tarefa da Light)
  minReplicaCount: 0
  maxReplicaCount: 5 # Limita pods pesados para nao sugar o cluster
  pollingInterval: 10
  cooldownPeriod: 300
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: "{SQS_QUEUE_URL_OCR}" # Terraform injeta Fila Exclusiva p/ PDFs/Imagens
        queueLength: "2" # Sobe um Pod GIGANTE a cada 2 faturas pesadas
        awsRegion: "us-east-1"
        identityOwner: keda
